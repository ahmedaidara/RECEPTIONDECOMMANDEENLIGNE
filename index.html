    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAQ9G3w94aM7iGc_ufHMzdCvrwzzEzlhI",
            authDomain: "poulailler-3515e.firebaseapp.com",
            projectId: "poulailler-3515e",
            storageBucket: "poulailler-3515e.firebasestorage.app",
            messagingSenderId: "482441929117",
            appId: "1:482441929117:web:7970df401b0125560acf74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allOrders = [];
        let currentFilter = 'all';
        let allProductions = [];
        let currentProductionId = null;
        let currentProductionData = null;

        // ========== CHARGEMENT DES PRODUCTIONS ==========
       async function loadProductions() {
    try {
        const snapshot = await db.collection('stocks_attribues')
            .where('boutique', '==', 'en-ligne')
            .get();
        
        allProductions = [];
        for (const doc of snapshot.docs) {
            const stock = doc.data();
            const prodDoc = await db.collection('poulailler_records').doc(stock.productionId).get();
            if (prodDoc.exists) {
                const production = prodDoc.data();
                const date = production.startDate ? new Date(production.startDate) : new Date();
                const dateStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
                
                // Calculer le stock restant
                const stockTotal = stock.total || 0;
                const stockVendu = stock.totalSold || 0;
                const stockRestant = stockTotal - stockVendu;
                
                allProductions.push({
                    id: stock.productionId,
                    stockId: doc.id,
                    name: production.productionName || `Production du ${dateStr}`,
                    date: production.startDate,
                    total: stockTotal,
                    vendu: stockVendu,
                    stockRestant: stockRestant
                });
            }
        }
        
        allProductions.sort((a, b) => new Date(b.date) - new Date(a.date));
        console.log('✅ Productions chargées:', allProductions.length);
        
        if (allProductions.length > 0) {
            currentProductionId = allProductions[0].id;
        }
    } catch (error) {
        console.error('Erreur chargement productions:', error);
    }
}

        // ========== AFFICHAGE DES COMMANDES ==========
        function displayOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Aucune commande</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => {
                const date = order.createdAt?.toDate() || new Date();
                const dateStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
                
                let statusText = '', statusClass = '';
                switch(order.status) {
                    case 'en_attente': statusText = 'En attente'; statusClass = 'status-en_attente'; break;
                    case 'en_livraison': statusText = 'En livraison'; statusClass = 'status-en_livraison'; break;
                    case 'livre': statusText = 'Livrée'; statusClass = 'status-livre'; break;
                    default: statusText = order.status; statusClass = '';
                }
                
                let paymentText = '', paymentClass = '';
                switch(order.paymentStatus) {
                    case 'paye': paymentText = 'Payé'; paymentClass = 'payment-paye'; break;
                    case 'partiel': paymentText = `Partiel (${(order.paymentReceived || 0).toLocaleString('fr-FR')})`; paymentClass = 'payment-partiel'; break;
                    case 'annulee': statusText = 'Annulée'; statusClass = 'status-annulee'; break;
                    default: paymentText = 'Impayé'; paymentClass = 'payment-impaye';
                }
                
                return `
                    <tr>
                        <td><strong>${order.orderNumber || order.id.slice(0,8)}</strong><br><small>${dateStr}</small></td>
                        <td>${order.client?.name || 'N/A'}</td>
                        <td>${order.client?.phone || 'N/A'}</td>
                        <td style="font-weight: bold; color: #f5a623;">${(order.total || 0).toLocaleString('fr-FR')} F CFA</td>
                        <td>
                          
<select id="prodSelect_${order.id}" 
        onchange="updateOrderProduction('${order.id}', this.value, this.options[this.selectedIndex].getAttribute('data-stock-id'), this.options[this.selectedIndex].getAttribute('data-name'))" 
        style="padding: 8px; border-radius: 8px; border: 2px solid ${!order.productionId ? '#f5a623' : '#10b981'}; background: ${!order.productionId ? '#fffaf5' : '#f0fdf4'}; font-size: 0.75rem; font-weight: bold; cursor: pointer; min-width: 180px;">
    <option value="">⚠️ Sélectionner une production</option>
    ${allProductions.map(prod => `
        <option value="${prod.id}" 
                data-stock-id="${prod.stockId}"
                data-name="${prod.name}"
                ${order.productionId === prod.id ? 'selected' : ''}
                style="${order.productionId === prod.id ? 'background: #d1fae5;' : ''}">
            ${prod.name} (${prod.stockRestant || '?'} restants)
        </option>
    `).join('')}
</select>
${!order.productionId ? '<span style="display: inline-block; margin-left: 8px; background: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 10px; font-size: 0.65rem;">⚠️ à assigner</span>' : '<span style="display: inline-block; margin-left: 8px; color: #10b981; font-size: 0.65rem;"><i class="fas fa-check-circle"></i> assignée</span>'}
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td><span class="payment-badge ${paymentClass}">${paymentText}</span></td>
                        <td class="action-buttons">
                            <button class="btn-action btn-livraison" onclick="updateStatus('${order.id}', 'en_livraison')">🚚 Livraison</button>
                            <button class="btn-action btn-livre" onclick="updateStatus('${order.id}', 'livre')">✅ Livrée</button>
                            <button class="btn-action btn-payer" onclick="openPaymentModal('${order.id}', ${order.total || 0})">💰 Payer</button>
                            
                            <button class="btn-action btn-details" onclick="viewDetails('${order.id}')">📋 Détails</button>
                            <button class="btn-action btn-pdf" onclick="generateOrderPDF('${order.id}')">📄 PDF</button>
                                                        <button class="btn-action btn-cancel-order" onclick="cancelOrder('${order.id}')" style="background:#f59e0b;">❌ Annuler</button>

                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterOrders() {
            let filtered = allOrders;
            if (currentFilter !== 'all') {
                filtered = allOrders.filter(o => o.status === currentFilter);
            }
            displayOrders(filtered);
        }

               function updateStatus(orderId, newStatus) {
            db.collection('orders').doc(orderId).update({
                status: newStatus,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                syncToInvoice(orderId); // ← AJOUTE CETTE LIGNE
            });
            showToast(`Statut mis à jour: ${newStatus === 'en_livraison' ? 'En livraison' : 'Livrée'}`);
        }

      async function updateOrderProduction(orderId, productionId, stockId, productionName) {
    if (!productionId) {
        showToast('❌ Veuillez sélectionner une production valide', 'error');
        return;
    }
    
    try {
        // Récupérer les infos de la production pour vérifier le stock
        const stockDoc = await db.collection('stocks_attribues').doc(stockId).get();
        if (!stockDoc.exists) {
            showToast('❌ Production non trouvée', 'error');
            return;
        }
        
        const stockData = stockDoc.data();
        const stockRestant = (stockData.total || 0) - (stockData.totalSold || 0);
        
        // Récupérer la commande pour connaître la quantité
        const orderDoc = await db.collection('orders').doc(orderId).get();
        const order = orderDoc.data();
        
        // Calculer la quantité totale de la commande
        const orderQuantity = order.items?.reduce((sum, item) => sum + (item.quantity || 0), 0) || 0;
        
        // Vérifier si le stock est suffisant
        if (orderQuantity > stockRestant) {
            showToast(`⚠️ Stock insuffisant ! Il reste ${stockRestant} poulets, commande: ${orderQuantity}`, 'error');
            return;
        }
        
        // Mettre à jour la commande
        await db.collection('orders').doc(orderId).update({
            productionId: productionId,
            stockAttribueId: stockId,
            productionName: productionName,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // Mettre à jour l'affichage du sélecteur
        const select = document.getElementById(`prodSelect_${orderId}`);
        if (select) {
            select.style.border = '2px solid #10b981';
            select.style.background = '#f0fdf4';
        }
        
        // Mettre à jour le stock vendu
        await db.collection('stocks_attribues').doc(stockId).update({
            totalSold: firebase.firestore.FieldValue.increment(orderQuantity),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showToast(`✅ Production assignée: ${productionName} (${orderQuantity} poulet(s))`, 'success');
        
        // Rafraîchir l'affichage
        filterOrders();
        
    } catch (error) {
        console.error('Erreur:', error);
        showToast('❌ Erreur: ' + error.message, 'error');
    }
}

         function openPaymentModal(orderId, total) {
    db.collection('orders').doc(orderId).get().then(doc => {
        if (!doc.exists) return;
        
        const order = doc.data();
        const montantActuel = order.paymentReceived || 0;
        const modeActuel = order.paymentMethod || 'especes';
        
        // Créer une modal personnalisée
        const modalDiv = document.createElement('div');
        modalDiv.className = 'payment-modal';
        modalDiv.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        `;
        
        modalDiv.innerHTML = `
            <div style="background: white; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin: 0;"><i class="fas fa-money-bill-wave"></i> Enregistrer le paiement</h3>
                    <button onclick="this.closest('.payment-modal').remove()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
                </div>
                
                <p><strong>Total commande:</strong> ${total.toLocaleString('fr-FR')} F CFA</p>
                <p><strong>Déjà payé:</strong> ${montantActuel.toLocaleString('fr-FR')} F CFA</p>
                <p><strong>Reste à payer:</strong> <span style="color: #f59e0b; font-weight: bold;">${(total - montantActuel).toLocaleString('fr-FR')} F CFA</span></p>
                
                <div style="margin: 20px 0;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold;">💰 Mode de paiement :</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <label style="display: flex; align-items: center; gap: 5px; background: #f0f0f0; padding: 10px 15px; border-radius: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="especes" ${modeActuel === 'especes' ? 'checked' : ''}> 💵 Espèces
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; background: #f0f0f0; padding: 10px 15px; border-radius: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="wave" ${modeActuel === 'wave' ? 'checked' : ''}> 📱 Wave
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; background: #f0f0f0; padding: 10px 15px; border-radius: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="orange" ${modeActuel === 'orange' ? 'checked' : ''}> 📱 Orange Money
                        </label>
                    </div>

                <div style="margin: 20px 0;">

async function syncToInvoice(orderId) {
    try {
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) return;
        
        const order = orderDoc.data();
        
        // CORRECTION ICI : Bien mapper le mode de paiement
        let modePaiement = 'especes'; // valeur par défaut
        if (order.paymentMethod === 'wave') {
            modePaiement = 'wave';
        } else if (order.paymentMethod === 'orange') {
            modePaiement = 'orange';
        } else if (order.paymentMethod === 'especes') {
            modePaiement = 'especes';
        }
        
        // Vérifier si une facture existe déjà
        const existingInvoice = await db.collection('invoices')
            .where('orderId', '==', orderId)
            .get();
        
        const invoiceData = {
            orderId: orderId,
            boutique: 'en-ligne',
            boutiqueName: 'TIKTOK SHOP',
            boutiquePhone: '77 777 77 82',
            client: order.client || { name: 'Client TikTok', phone: 'Non renseigné' },
            items: order.items || [],
            total: order.total || 0,
            invoiceNumber: order.orderNumber || `INV-${orderId.slice(0,8)}`,
            paiement: {
                montantPaye: order.paymentReceived || 0,
                resteAPayer: (order.paymentRemaining || order.total || 0),
                modePaiement: modePaiement,  // ← CORRIGÉ
                statut: order.paymentStatus || 'impaye',
                datePaiement: new Date().toISOString()
            },
            status: order.status === 'livre' ? 'completed' : 'pending',
            productionId: order.productionId || null,
            createdAt: order.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if (!existingInvoice.empty) {
            // Mettre à jour la facture existante
            const invoiceId = existingInvoice.docs[0].id;
            await db.collection('invoices').doc(invoiceId).update(invoiceData);
            console.log('✅ Facture mise à jour avec mode:', modePaiement);
        } else {
            // Créer une nouvelle facture
            const newInvoice = await db.collection('invoices').add(invoiceData);
            console.log('✅ Nouvelle facture créée avec mode:', modePaiement);
        }
    } catch (error) {
        console.error('Erreur synchro facture:', error);
    }
}

        // ========== SUPPRIMER UNE COMMANDE COMPLÈTEMENT ==========
        async function deleteOrder(orderId) {
            // Demander confirmation
            const confirmation = prompt(`⚠️ SUPPRESSION DÉFINITIVE ⚠️\n\nCette action va supprimer :\n- La commande\n- La facture associée\n- Le suivi pour le client\n\nTapez "SUPPRIMER" pour confirmer :`);
            
            if (confirmation !== "SUPPRIMER") {
                showToast('❌ Suppression annulée');
                return;
            }
            
            try {
                // 1. Récupérer la commande pour avoir le numéro
                const orderDoc = await db.collection('orders').doc(orderId).get();
                if (!orderDoc.exists) {
                    showToast('Commande non trouvée', 'error');
                    return;
                }
                
                const order = orderDoc.data();
                const orderNumber = order.orderNumber || orderId.slice(0,8);
                
                // 2. Supprimer la commande
                await db.collection('orders').doc(orderId).delete();
                console.log('✅ Commande supprimée:', orderId);
                
                // 3. Supprimer la facture associée (si elle existe)
                const invoicesSnapshot = await db.collection('invoices')
                    .where('orderId', '==', orderId)
                    .get();
                
                let deletedInvoices = 0;
                for (const doc of invoicesSnapshot.docs) {
                    await db.collection('invoices').doc(doc.id).delete();
                    deletedInvoices++;
                    console.log('✅ Facture supprimée:', doc.id);
                }
                
                // 4. Mettre à jour l'affichage
                const index = allOrders.findIndex(o => o.id === orderId);
                if (index !== -1) {
                    allOrders.splice(index, 1);
                }
                
                // 5. Recharger l'affichage
                filterOrders();
                
                // 6. Mettre à jour les stats
                const totalCA = allOrders.reduce((sum, o) => sum + (o.paymentReceived || 0), 0);
                document.getElementById('totalOrders').textContent = allOrders.length;
                document.getElementById('totalRevenue').textContent = totalCA.toLocaleString('fr-FR') + ' F CFA';
                document.getElementById('pendingOrders').textContent = allOrders.filter(o => o.status === 'en_attente').length;
                document.getElementById('deliveringOrders').textContent = allOrders.filter(o => o.status === 'en_livraison').length;
                document.getElementById('deliveredOrders').textContent = allOrders.filter(o => o.status === 'livre').length;
                
                showToast(`✅ Commande ${orderNumber} supprimée ! ${deletedInvoices} facture(s) supprimée(s).`, 'success');
                
            } catch (error) {
                console.error('Erreur:', error);
                showToast('❌ Erreur: ' + error.message, 'error');
            }
        }
      
      // ========== ANNULER UNE COMMANDE (changer statut uniquement) ==========
async function cancelOrder(orderId) {
    const confirmation = confirm(`⚠️ ANNULATION DE LA COMMANDE ⚠️\n\nVoulez-vous vraiment annuler cette commande ?\n\nLe statut passera à "Annulée" mais la commande restera dans l'historique.`);
    
    if (!confirmation) return;
    
    try {
        await db.collection('orders').doc(orderId).update({
            status: 'annulee',
            cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // Mettre à jour aussi la facture si elle existe
        const invoicesSnapshot = await db.collection('invoices')
            .where('orderId', '==', orderId)
            .get();
        
        for (const doc of invoicesSnapshot.docs) {
            await db.collection('invoices').doc(doc.id).update({
                status: 'cancelled',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        showToast(`✅ Commande annulée`, 'warning');
        
    } catch (error) {
        console.error('Erreur:', error);
        showToast('❌ Erreur: ' + error.message, 'error');
    }
}
      
      // ========== PAIEMENT RAPIDE AVEC MODE ==========
async function quickPayment(orderId) {
    const doc = await db.collection('orders').doc(orderId).get();
    if (!doc.exists) return;
    
    const order = doc.data();
    const total = order.total || 0;
    const reste = total - (order.paymentReceived || 0);
    
    if (reste <= 0) {
        showToast('Cette commande est déjà entièrement payée', 'warning');
        return;
    }
    
    const modalDiv = document.createElement('div');
    modalDiv.className = 'payment-modal';
    modalDiv.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3000;
    `;
    
    modalDiv.innerHTML = `
        <div style="background: white; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px;">
            <h3 style="margin-bottom: 15px;">💰 Paiement restant</h3>
            <p><strong>Reste à payer:</strong> <span style="color: #f59e0b; font-size: 1.2rem;">${reste.toLocaleString('fr-FR')} F CFA</span></p>
            
            <div style="margin: 15px 0;">
                <label>Mode de paiement :</label>
                <select id="quickPaymentMethod" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="especes">💵 Espèces</option>
                    <option value="wave">📱 Wave</option>
                    <option value="orange">📱 Orange Money</option>
                </select>
            </div>
            
            <div style="margin: 15px 0;">
                <label>Montant à payer :</label>
                <input type="number" id="quickPaymentAmount" value="${reste}" min="0" max="${reste}" step="100" 
                       style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd;">
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="confirmQuickPayment" style="flex: 1; background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">
                    Confirmer
                </button>
                <button onclick="this.closest('.payment-modal').remove()" style="flex: 1; background: #666; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">
                    Annuler
                </button>
            </div>
        </div>
    `;
    
    document.body.appendChild(modalDiv);
    
    document.getElementById('confirmQuickPayment').onclick = async () => {
        const payAmount = parseInt(document.getElementById('quickPaymentAmount').value) || 0;
        const method = document.getElementById('quickPaymentMethod').value;
        const nouveauTotalPaye = (order.paymentReceived || 0) + payAmount;
        
        let paymentStatus = 'impaye';
        if (nouveauTotalPaye >= total) {
            paymentStatus = 'paye';
        } else if (nouveauTotalPaye > 0) {
            paymentStatus = 'partiel';
        }
        
        console.log('💰 Mode sélectionné (quick):', method);
        
        await db.collection('orders').doc(orderId).update({
            paymentReceived: nouveauTotalPaye,
            paymentRemaining: total - nouveauTotalPaye,
            paymentStatus: paymentStatus,
            paymentMethod: method,  // ← valeur correcte
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await syncToInvoice(orderId);
        
        let modeTexte = method === 'especes' ? 'Espèces' : (method === 'wave' ? 'Wave' : 'Orange Money');
        showToast(`✅ ${payAmount.toLocaleString('fr-FR')} F CFA payés par ${modeTexte}`);
        modalDiv.remove();
    };
}

let ordersUnsubscribe = null;

      
      
async function listenToTikTokOrders() {
    if (ordersUnsubscribe) {
        ordersUnsubscribe();
    }
    
    console.log("🟢 Écoute des commandes TikTok Shop activée...");
    
    ordersUnsubscribe = db.collection('orders')
        .where('boutique', '==', 'en-ligne')
        .onSnapshot(async (snapshot) => {
            console.log("📡 Changement détecté dans les commandes TikTok :", snapshot.size);
            
            // Transformer les commandes en factures virtuelles pour les stats
            const virtualInvoices = [];
            
            for (const doc of snapshot.docs) {
                const order = doc.data();
                
                // Calculer le montant payé
                const montantPaye = order.paymentReceived || 0;
                const montantTotal = order.total || 0;
                
                // Déterminer le statut de paiement
                let statutPaiement = 'impayé';
                if (montantPaye >= montantTotal && montantTotal > 0) {
                    statutPaiement = 'payé';
                } else if (montantPaye > 0) {
                    statutPaiement = 'partiel';
                }
                
                // Créer une facture virtuelle pour les stats
                virtualInvoices.push({
                    id: doc.id,
                    total: montantTotal,
                    paiement: {
                        montantPaye: montantPaye,
                        statut: statutPaiement
                    },
                    items: order.items || [],
                    client: order.client || { name: 'Client TikTok' },
                    boutique: 'en-ligne',
                    boutiqueName: 'TikTok Shop',
                    status: order.status,  // 'en_attente', 'en_livraison', 'livre', 'annulee'
                    createdAt: order.createdAt
                });
            }
            
            // Pour les commandes annulées, ne pas les compter dans les ventes
            const activeInvoices = virtualInvoices.filter(inv => inv.status !== 'annulee');
            
            // Mettre à jour les stats globales avec les commandes TikTok + factures existantes
            await refreshAllStatsWithOrders(activeInvoices);
        }, (error) => {
            console.error("❌ Erreur écoute commandes:", error);
        });
}

// Fonction pour rafraîchir toutes les stats en intégrant les commandes TikTok
async function refreshAllStatsWithOrders(tiktokInvoices) {
    // 1. Récupérer les factures normales (boutiques physiques)
    const normalInvoicesSnapshot = await db.collection("invoices").get();
    const normalInvoices = normalInvoicesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    // 2. Fusionner les deux sources
    const allInvoicesCombined = [...normalInvoices, ...tiktokInvoices];
    
    // 3. Recalculer toutes les stats
    let totalCA = 0;
    let totalFacturesMontant = 0;
    let totalPoulets = 0;
    let totalDette = 0;
    
    allInvoicesCombined.forEach(inv => {
        const montantPaye = inv.paiement?.montantPaye || 0;
        const montantTotal = inv.total || 0;
        
        totalCA += montantPaye;
        totalFacturesMontant += montantTotal;
        totalDette += (montantTotal - montantPaye);
        
        if (inv.items) {
            inv.items.forEach(item => {
                totalPoulets += item.quantity || 0;
            });
        }
    });
    
    // 4. Mettre à jour l'affichage des stats
    const totalNbVentes = allInvoicesCombined.length;
    
    // Mettre à jour les éléments HTML
    const statTotalSalesAll = document.getElementById("statTotalSalesAll");
    const statTotalNbVentes = document.getElementById("statTotalNbVentes");
    const statTotalDette = document.getElementById("statTotalDette");
    
    if (statTotalSalesAll) statTotalSalesAll.innerHTML = totalCA.toLocaleString() + " FCFA";
    if (statTotalNbVentes) statTotalNbVentes.innerText = totalNbVentes.toLocaleString();
    if (statTotalDette) statTotalDette.innerHTML = totalDette.toLocaleString() + " FCFA";
    
    // 5. Mettre à jour le graphique avec les deux sources
    const boutiqueSales = {};
    allInvoicesCombined.forEach(inv => {
        let shop = inv.boutiqueName || inv.boutique || "TikTok Shop";
        if (shop === "en-ligne") shop = "TikTok Shop";
        boutiqueSales[shop] = (boutiqueSales[shop] || 0) + (inv.paiement?.montantPaye || 0);
    });
    
    const labels = Object.keys(boutiqueSales).slice(0,6);
    const data = labels.map(l => boutiqueSales[l]);
    
    if (window.chartVentes) window.chartVentes.destroy();
    const ctx = document.getElementById('ventesChart')?.getContext('2d');
    if (ctx) {
        window.chartVentes = new Chart(ctx, { 
            type: 'bar', 
            data: { 
                labels, 
                datasets: [{ 
                    label: 'CA par boutique (FCFA)', 
                    data, 
                    backgroundColor: '#3b8b5e' 
                }] 
            }, 
            options: { 
                responsive: true, 
                maintainAspectRatio: true 
            } 
        });
    }
    
    console.log("✅ Stats mises à jour - CA total:", totalCA, "Dette:", totalDette);
}
